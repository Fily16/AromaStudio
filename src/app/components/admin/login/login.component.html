<div class="login-page">
  <div class="login-card">
    <h1>AromaStudio</h1>
    <p class="subtitle">Panel de Administración</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [value]="email()" (input)="email.set($any($event.target).value)" placeholder="admin@aromastudio.pe">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" [value]="password()" (input)="password.set($any($event.target).value)" placeholder="••••••••" (keyup.enter)="login()">
    </div>

    @if (error()) {
      <p class="error">{{error()}}</p>
    }

    <button class="login-btn" (click)="login()" [disabled]="loading()">
      {{loading() ? 'Ingresando...' : 'Ingresar'}}
    </button>
  </div>
</div>
